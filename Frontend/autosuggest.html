<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .left-bar{
            position: fixed;
            top: 20px;
            left: 20px;
        }
        .right-bar{
            position: fixed;
            top: 20px;
            right: 20px;
        }
        .search-section{
            text-align: center;
            margin-top: 100px;
        }
        
            .logo-first{
                color : blue;
            }
            .tagline{
                color: palevioletred;
            }
            .lens{
                position: relative;
                left: 35px;
            }
            .search-bar{
                padding: 15px 15px 15px 45px;
                border-radius: 40px;
                width: 250px;

            }
            #suggestion-box{
                border: 1px solid black;
                width: 45%;
                margin-left: 29%;
                
            }
            #suggestion-item{
                border: 1px solid black;
                padding:10px ;
                border-radius: 10px;


            }
    </style>
</head>
<body>
    <div>
        <span class="left-bar">&#9881</span>
        <span class="right-bar"> &#x2022; online | &#x1F552; -ms</span>
    </div>
    <div class="search-section">
        <h1><span class="logo-first">BEING </span>INFINITY</h1>
        <p><span class="tagline"> million phases. Four Algorithms. Prefix Based Auto Suggest.</span></p>
       <span><span class="lens">&#128269;</span>
      <input class="search-bar" id="search-bar" placeholder="Start typing to Search">
       <div id="suggestionBox">
        
       </div>
    </div>
    <script>
      var searchBar=document.getElementById("search-bar");
       var suggestionBox=document.getElementById("suggestionBox");
      
      searchBar.addEventListener("input",function(){ 
        /*get user type text
        api call to get suggestions
        display data results in html*/
        var userInput = searchBar.value;
        if(userInput.trim() == "")
      {

      }
      else{
        var url1= "https://autosuggest-backend.onrender.com/api/autosuggest?q=";
        var url3 ="&algorithm=brute&limit=10&weighted=false";
        var url = url1 + userInput+ url3;
        fetch(url).
         then(function(response){
            return response.json();
         })
         .then(function(data){
            console.log(data);
            var resultsArray=data.results;
            var htmlResults="";
            for(var i=0;i<resultsArray.length;i++)
         {
            htmlResults +="<div id='suggestion-item'>" + resultsArray[i].text + "</div>"
         }
            suggestionBox.innerHTML = htmlResults;
      })
      }
      })
    </script>
</body>
</html>
