<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .left-bar{
            position : fixed;
            top: 20px;
            left : 20px;
        }
        .right-bar{
            position: fixed;
            top: 20px;
            right: 20px;
        }

        .search-section{
            text-align: center;
            margin-top: 40px;
        }
        .logo{
            color :rgb(0, 4, 255);
        }
        .lens{
            position: relative;
            left : 35px;
        }
        .search-box{
            padding: 15px 14px 15px 45px;
            border-radius: 20px;
            width: 50%;
            border-color: aqua;
        }
        #suggestion-box{
            width : 45%;
            margin-left: 29%;
        }
    </style>
</head>
<body>
    
    <div>
        <span class = "left-bar">&#9881; </span>
        <span class = "right-bar">&#8226; online | &#x23F0; - ms</span>
    </div>

    <div class = "search-section">
        <h1><span class = "logo"> Lost Frequency </span></h1>
        <p><span class = "logo-line"> One million phrases. Four algorithms. Prefix Based Auto Suggest</span></p>
        <span class = "lens">&#128269; </span>
        <input class = "search-box" placeholder="Start typing to search" > 
        <br><br>
        <div id = "suggestion-box">
    </div>
</div>
<script>
      var searchBar=document.getElementById("search-bar");
       var suggestionBox=document.getElementById("suggestionBox");
      
      searchBar.addEventListener("input",function(){ 
        /*get user type text
        api call to get suggestions
        display data results in html*/
        var userInput = searchBar.value;
        if(userInput.trim() == "")
      {

      }
      else{
        var url1= "https://autosuggest-backend.onrender.com/api/autosuggest?q=";
        var url3 ="&algorithm=brute&limit=10&weighted=false";
        var url = url1 + userInput+ url3;
        fetch(url).
         then(function(response){
            return response.json();
         })
         .then(function(data){
            console.log(data);
            var resultsArray=data.results;
            var htmlResults="";
            for(var i=0;i<resultsArray.length;i++)
         {
            htmlResults="<div id='suggestion-item'>" + resultsArray[i].text + "</div>"
         }
            suggestionBox.innerHTML = htmlResults;
      })
      }
      })
    </script>


</body>
</html>
